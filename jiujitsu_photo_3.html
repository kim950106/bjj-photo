<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>퍼스트짐 포토부스</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
:root {
  --black:#0a0a0a; --dark:#111; --card:#1a1a1a; --border:#2a2a2a;
  --white:#f5f5f0; --gold:#c9a84c; --gold2:#e8c96a; --red:#e63946;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--black);color:var(--white);font-family:'Noto Sans KR',sans-serif;
  height:100dvh;overflow:hidden;user-select:none;}

/* SCREENS */
.screen{position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
  animation:fadeIn 0.3s ease;}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* LOGO */
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,5vw,44px);
  letter-spacing:4px;color:var(--gold);text-shadow:0 0 30px rgba(201,168,76,.4);margin-bottom:4px;}
.subtitle{font-size:11px;letter-spacing:3px;color:#555;text-transform:uppercase;margin-bottom:28px;}

/* SHOT GRID */
.shot-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:460px;}
.shot-btn{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:26px 16px;cursor:pointer;transition:all .2s;text-align:center;}
.shot-btn:active{border-color:var(--gold);transform:scale(.97);}
.shot-num{font-family:'Bebas Neue',sans-serif;font-size:50px;color:var(--gold);line-height:1;}
.shot-label{font-size:12px;color:#777;margin-top:4px;letter-spacing:1px;}

/* PEOPLE */
.people-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;width:100%;max-width:440px;}
.people-btn{width:74px;height:74px;background:var(--card);border:1px solid var(--border);
  border-radius:50%;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:30px;
  color:var(--white);display:flex;align-items:center;justify-content:center;transition:all .18s;}
.people-btn:active{border-color:var(--gold);color:var(--gold);transform:scale(.93);}

/* BELT */
.belt-scroll{width:100%;max-width:500px;max-height:56vh;overflow-y:auto;
  display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:#333 transparent;}
.belt-block{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.belt-block-label{font-size:11px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:12px;}
.belt-row{display:flex;gap:10px;flex-wrap:wrap;}
.belt-opt{width:50px;height:50px;border-radius:50%;border:2px solid transparent;
  cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;font-size:18px;}
.belt-opt.none-opt{background:#1e1e1e;color:#555;border-color:#333;}
.belt-opt.selected{border-color:var(--gold)!important;box-shadow:0 0 14px rgba(201,168,76,.5);}

/* SECTION TITLE */
.section-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  color:var(--gold);margin-bottom:20px;text-align:center;}

/* BUTTONS */
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--black);
  border:none;border-radius:14px;padding:16px 36px;font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:3px;cursor:pointer;transition:all .18s;min-width:180px;}
.btn-primary:active{transform:scale(.96);opacity:.9;}
.btn-secondary{background:transparent;color:#666;border:1px solid var(--border);
  border-radius:14px;padding:12px 24px;font-size:14px;cursor:pointer;
  transition:all .18s;letter-spacing:1px;}
.btn-secondary:active{color:var(--white);border-color:#555;}
.btn-row{display:flex;gap:12px;margin-top:20px;justify-content:center;flex-wrap:wrap;}

/* CAMERA */
#screen-camera{padding:0;background:#000;justify-content:flex-end;}
#cam-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000;}
#cam-canvas{display:block;max-width:100%;max-height:100%;object-fit:contain;}
#frame-guide{position:absolute;border:2px solid rgba(201,168,76,.6);border-radius:4px;
  pointer-events:none;box-shadow:0 0 0 2000px rgba(0,0,0,.3);}
#countdown{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Bebas Neue',sans-serif;font-size:120px;color:var(--gold);
  text-shadow:0 0 40px rgba(201,168,76,.8);opacity:0;pointer-events:none;transition:opacity .2s;}
#flash{position:absolute;inset:0;background:white;opacity:0;pointer-events:none;transition:opacity .06s;}
#shot-strip{position:absolute;bottom:110px;right:14px;display:flex;flex-direction:column;gap:6px;}
.strip-thumb{width:54px;height:43px;border-radius:6px;object-fit:cover;border:1.5px solid var(--gold);opacity:.85;}
.strip-empty{width:54px;height:43px;border-radius:6px;border:1.5px dashed rgba(201,168,76,.35);}
#cam-ui{position:absolute;bottom:0;left:0;right:0;padding:14px 24px 36px;
  background:linear-gradient(transparent,rgba(0,0,0,.92));
  display:flex;align-items:center;justify-content:space-between;gap:12px;}
#shot-counter{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--gold);min-width:72px;letter-spacing:2px;}
#shutter-btn{width:72px;height:72px;border-radius:50%;background:var(--white);
  border:4px solid rgba(255,255,255,.25);cursor:pointer;transition:all .15s;flex-shrink:0;
  box-shadow:0 0 20px rgba(255,255,255,.2);}
#shutter-btn:active{transform:scale(.9);background:var(--gold);}
#shutter-btn.disabled{opacity:.3;pointer-events:none;}
#hidden-video{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;}

/* FILTER */
#screen-filter{overflow-y:auto;padding:20px 14px;justify-content:flex-start;}
.filter-strip{display:flex;gap:12px;overflow-x:auto;width:100%;padding:6px 4px;scrollbar-width:none;}
.filter-strip::-webkit-scrollbar{display:none;}
.filter-item{flex-shrink:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;}
.filter-wrap{width:88px;height:70px;border-radius:10px;overflow:hidden;
  border:2px solid transparent;transition:border-color .18s;}
.filter-wrap.selected{border-color:var(--gold);}
.filter-thumb{width:100%;height:100%;object-fit:cover;display:block;}
.filter-name{font-size:10px;color:#777;letter-spacing:1px;}
.filter-item.active .filter-name{color:var(--gold);}
.final-wrap{width:100%;max-width:380px;border-radius:14px;overflow:hidden;
  border:1px solid var(--border);margin:16px auto;}
#final-canvas{display:block;width:100%;height:auto;}

/* TIMER SELECT */
.timer-sel-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.timer-opt{
  padding:12px 20px;border-radius:12px;
  background:var(--card);border:1.5px solid var(--border);
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;
  color:#666;cursor:pointer;transition:all .18s;min-width:62px;text-align:center;
}
.timer-opt.selected{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08);}
.timer-opt:active{transform:scale(.94);}

/* QR LOADING */
#screen-qr{gap:0;}
.qr-status-box{width:100%;max-width:340px;background:var(--card);
  border:1px solid var(--border);border-radius:20px;padding:28px 24px;
  display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:16px;}

/* loading spinner */
.spinner{width:52px;height:52px;border:3px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:#777;letter-spacing:2px;}

/* QR result */
#qr-result-inner{display:none;flex-direction:column;align-items:center;gap:12px;width:100%;}
#qr-container{background:white;border-radius:12px;padding:12px;}
.qr-timer-num{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--red);letter-spacing:2px;}
.timer-bar{width:100%;height:4px;background:#222;border-radius:2px;overflow:hidden;}
.timer-fill{height:100%;background:var(--red);transition:width 1s linear;border-radius:2px;}
.qr-hint{font-size:12px;color:#555;text-align:center;line-height:1.7;}
.qr-url{font-size:11px;color:var(--gold);letter-spacing:.5px;word-break:break-all;text-align:center;}
.error-box{color:var(--red);font-size:13px;text-align:center;padding:20px;line-height:1.7;}
</style>
</head>
<body>

<!-- ① 컷 선택 -->
<div class="screen active" id="screen-shot">
  <div class="logo">FIRST GYM</div>
  <div class="subtitle">BJJ PHOTO BOOTH · SINCE 2006</div>
  <div class="shot-grid">
    <div class="shot-btn" onclick="selectShots(1)"><div class="shot-num">1</div><div class="shot-label">ONE SHOT</div></div>
    <div class="shot-btn" onclick="selectShots(2)"><div class="shot-num">2</div><div class="shot-label">TWO SHOTS</div></div>
    <div class="shot-btn" onclick="selectShots(3)"><div class="shot-num">3</div><div class="shot-label">THREE SHOTS</div></div>
    <div class="shot-btn" onclick="selectShots(4)"><div class="shot-num">4</div><div class="shot-label">FOUR SHOTS</div></div>
  </div>
</div>

<!-- ② 인원 선택 -->
<div class="screen" id="screen-people">
  <div class="section-title">촬영 인원 선택</div>
  <div class="people-row">
    <div class="people-btn" onclick="selectPeople(1)">1</div>
    <div class="people-btn" onclick="selectPeople(2)">2</div>
    <div class="people-btn" onclick="selectPeople(3)">3</div>
    <div class="people-btn" onclick="selectPeople(4)">4</div>
    <div class="people-btn skip-btn" onclick="selectPeople(0)" style="width:auto;padding:0 20px;border-radius:20px;font-size:14px;letter-spacing:1px;color:#666;border-color:#2a2a2a;">미선택</div>
  </div>

  <div style="margin-top:28px;width:100%;max-width:440px;">
    <div class="section-title" style="font-size:16px;margin-bottom:14px;">셔터 타이머</div>
    <div class="timer-sel-row" id="timer-sel-row">
      <div class="timer-opt selected" onclick="selectTimer(0)" data-val="0">즉시</div>
      <div class="timer-opt" onclick="selectTimer(3)" data-val="3">3초</div>
      <div class="timer-opt" onclick="selectTimer(6)" data-val="6">6초</div>
      <div class="timer-opt" onclick="selectTimer(10)" data-val="10">10초</div>
      <div class="timer-opt" onclick="selectTimer(15)" data-val="15">15초</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-secondary" onclick="goScreen('screen-shot')">← 이전</button>
  </div>
</div>

<!-- ③ 띠 선택 -->
<div class="screen" id="screen-belt">
  <div class="section-title">띠 선택</div>
  <div class="belt-scroll" id="belt-list"></div>
  <div class="btn-row">
    <button class="btn-secondary" onclick="goScreen('screen-people')">← 이전</button>
    <button class="btn-primary" onclick="startCamera()">촬영 시작 →</button>
  </div>
</div>

<!-- ④ 카메라 -->
<div class="screen" id="screen-camera">
  <div id="cam-wrap">
    <canvas id="cam-canvas"></canvas>
    <div id="frame-guide"></div>
    <div id="shot-strip"></div>
    <div id="countdown"></div>
    <div id="flash"></div>
  </div>
  <div id="cam-ui">
    <button class="btn-secondary" style="min-width:72px" onclick="stopCamera();goScreen('screen-belt')">← 이전</button>
    <div id="shot-counter">0 / 1</div>
    <button id="shutter-btn" onclick="takeShot()"></button>
    <div style="min-width:72px"></div>
  </div>
  <video id="hidden-video" autoplay playsinline muted></video>
</div>

<!-- ⑤ 필터 선택 -->
<div class="screen" id="screen-filter">
  <div class="section-title" style="margin-top:8px">필터 선택</div>
  <div class="filter-strip" id="filter-strip"></div>
  <div class="final-wrap"><canvas id="final-canvas"></canvas></div>
  <div class="btn-row">
    <button class="btn-secondary" onclick="restartCamera()">← 재촬영</button>
    <button class="btn-primary" onclick="generateQR()">QR 생성 →</button>
  </div>
</div>

<!-- ⑥ QR 다운로드 -->
<div class="screen" id="screen-qr">
  <div class="logo" style="margin-bottom:4px">DOWNLOAD</div>
  <div class="subtitle">QR 스캔으로 사진 저장</div>

  <div class="qr-status-box" id="qr-status-box">
    <!-- 로딩 상태 -->
    <div id="qr-loading">
      <div class="spinner"></div>
      <div class="loading-text">사진 업로드 중...</div>
    </div>
    <!-- 결과 상태 -->
    <div id="qr-result-inner">
      <div id="qr-container"></div>
      <div class="qr-url" id="qr-url"></div>
    </div>
    <!-- 에러 상태 -->
    <div id="qr-error" style="display:none" class="error-box"></div>
  </div>

  <div class="qr-timer-num" id="qr-timer"></div>
  <div class="timer-bar" style="width:280px;margin-bottom:10px"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
  <div class="qr-hint" id="qr-hint"></div>
  <div class="btn-row">
    <button class="btn-secondary" onclick="goFilterBack()">← 필터로</button>
    <button class="btn-primary" onclick="resetAll()">처음으로</button>
  </div>
</div>

/* ═══════════════════════════════════
   NAVIGATION
═══════════════════════════════════ */
function goScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ═══════════════════════════════════
   STEP 1 – 컷 선택
═══════════════════════════════════ */
function selectTimer(sec) {
  S.timerSec = sec;
  document.querySelectorAll('.timer-opt').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.val) === sec);
  });
}

function selectShots(n) { S.totalShots = n; goScreen('screen-people'); }

/* ═══════════════════════════════════
   STEP 2 – 인원 선택
═══════════════════════════════════ */
function selectPeople(n) {
  S.people = n;
  S.belts = new Array(n).fill(0);
  if (n === 0) {
    startCamera();
  } else {
    buildBeltUI();
    goScreen('screen-belt');
  }
}

/* ═══════════════════════════════════
   STEP 3 – 띠 선택
═══════════════════════════════════ */
function buildBeltUI() {
  const list = document.getElementById('belt-list');
  list.innerHTML = '';
  for (let p = 0; p < S.people; p++) {
    const block = document.createElement('div');
    block.className = 'belt-block';
    block.innerHTML = `<div class="belt-block-label">인원 ${p+1} — 카메라 기준 왼쪽에서 ${p+1}번째</div><div class="belt-row" id="br-${p}"></div>`;
    list.appendChild(block);
    const row = document.getElementById(`br-${p}`);
    BELTS.forEach((b, bi) => {
      const opt = document.createElement('div');
      opt.className = 'belt-opt' + (bi===0?' none-opt':'') + (S.belts[p]===bi?' selected':'');
      if (bi === 0) { opt.textContent = '✕'; }
      else { opt.style.background = b.color; opt.style.boxShadow = `0 0 8px ${b.glow}`; }
      opt.onclick = () => {
        S.belts[p] = bi;
        row.querySelectorAll('.belt-opt').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
      };
      row.appendChild(opt);
    });
  }
}

/* ═══════════════════════════════════
   STEP 4 – 카메라
═══════════════════════════════════ */
let vid, cvs, ctx;
const RW=4, RH=5;

function startCamera() {
  S.shots=[]; S.currentShot=0; S.shooting=false;
  goScreen('screen-camera');
  initCamera();
}
function restartCamera() {
  S.shots=[]; S.currentShot=0; S.shooting=false;
  stopCamera();
  goScreen('screen-camera');
  initCamera();
}

async function initCamera() {
  vid = document.getElementById('hidden-video');
  cvs = document.getElementById('cam-canvas');
  ctx = cvs.getContext('2d');
  if (S.stream) S.stream.getTracks().forEach(t=>t.stop());
  try {
    S.stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user', width:{ideal:1280}, height:{ideal:960}}, audio:false
    });
    vid.srcObject = S.stream;
    vid.onloadedmetadata = () => { vid.play(); setupCanvas(); updateShotUI(); renderLoop(); };
  } catch(e) {
    alert('카메라 접근 권한이 필요합니다.\nSafari 설정에서 카메라를 허용해주세요.');
  }
}

function setupCanvas() {
  const vw=vid.videoWidth||1280, vh=vid.videoHeight||960;
  cvs.width=vw; cvs.height=vh;
  const wrap=document.getElementById('cam-wrap');
  const ww=wrap.clientWidth, wh=wrap.clientHeight;
  const scale=Math.min(ww/vw, wh/vh);
  const dw=vw*scale, dh=vh*scale;
  const guide=document.getElementById('frame-guide');
  let fW,fH;
  if (dw/dh > RW/RH) { fH=dh*.88; fW=fH*(RW/RH); }
  else { fW=dw*.88; fH=fW*(RH/RW); }
  guide.style.width=fW+'px'; guide.style.height=fH+'px';
}

function renderLoop() {
  if (!S.stream) return;
  if (vid.readyState >= 2) {
    const vw=vid.videoWidth, vh=vid.videoHeight;
    ctx.save(); ctx.translate(vw,0); ctx.scale(-1,1);
    ctx.drawImage(vid,0,0,vw,vh);
    ctx.restore();
    drawBelts(vw,vh);
    drawLogoOverlay(vw,vh);
  }
  S.animFrame = requestAnimationFrame(renderLoop);
}

function drawBelts(vw,vh) {
  if (!beltImg.complete||!beltImg.naturalWidth) return;
  const iw=beltImg.naturalWidth, ih=beltImg.naturalHeight;
  const colW = vw/S.people;
  const bH=vh*.13, bW=bH*.9;
  for (let p=0;p<S.people;p++) {
    const bi=S.belts[p];
    if (!bi) continue;
    const si=bi-1;
    const sx=Math.round(BELT_SX[si]*iw), sw=Math.round(BELT_SW*iw);
    const cx=colW*p+colW/2;
    ctx.save();
    ctx.shadowColor=BELTS[bi].glow; ctx.shadowBlur=18;
    ctx.drawImage(beltImg, sx,0,sw,ih, cx-bW/2, vh*.03, bW, bH);
    ctx.restore();
  }
}

function drawLogoOverlay(vw,vh) {
  if (!logoImg.complete||!logoImg.naturalWidth) return;
  const lh=Math.round(vh*.055);
  const lw=Math.round(lh*(logoImg.naturalWidth/logoImg.naturalHeight));
  ctx.save(); ctx.globalAlpha=0.72;
  ctx.drawImage(logoImg, vw-lw-18, vh-lh-14, lw, lh);
  ctx.restore();
}

function updateShotUI() {
  document.getElementById('shot-counter').textContent=`${S.currentShot} / ${S.totalShots}`;
  const strip=document.getElementById('shot-strip');
  strip.innerHTML='';
  for(let i=0;i<S.totalShots;i++) {
    if (i<S.shots.length) {
      const c=document.createElement('canvas');
      c.className='strip-thumb'; c.width=54; c.height=43;
      c.getContext('2d').drawImage(S.shots[i],0,0,54,43);
      strip.appendChild(c);
    } else {
      const d=document.createElement('div');
      d.className='strip-empty'; strip.appendChild(d);
    }
  }
}

async function takeShot() {
  if (S.shooting||S.currentShot>=S.totalShots) return;
  S.shooting=true;
  document.getElementById('shutter-btn').classList.add('disabled');
  await countdown(S.timerSec);
  captureFrame();
  flashFX();
  S.currentShot++;
  updateShotUI();
  if (S.currentShot>=S.totalShots) {
    setTimeout(()=>{ stopCamera(); buildFilter(); goScreen('screen-filter'); },500);
  } else {
    setTimeout(()=>{ S.shooting=false; document.getElementById('shutter-btn').classList.remove('disabled'); },400);
  }
}

function captureFrame() {
  const vw=vid.videoWidth, vh=vid.videoHeight;
  let cw,ch;
  if(vw/vh>RW/RH){ch=vh;cw=ch*RW/RH;}else{cw=vw;ch=cw*RH/RW;}
  const cx=(vw-cw)/2, cy=(vh-ch)/2;
  const off=document.createElement('canvas');
  off.width=cw; off.height=ch;
  off.getContext('2d').drawImage(cvs,cx,cy,cw,ch,0,0,cw,ch);
  S.shots.push(off);
}

function countdown(n) {
  return new Promise(res=>{
    if (n === 0) { res(); return; }
    const el=document.getElementById('countdown');
    let cur=n; el.style.opacity='1'; el.textContent=cur;
    const iv=setInterval(()=>{
      cur--;
      if(cur<=0){clearInterval(iv);el.style.opacity='0';res();}
      else{el.textContent=cur;}
    },900);
  });
}
function flashFX(){const f=document.getElementById('flash');f.style.opacity='1';setTimeout(()=>f.style.opacity='0',120);}
function stopCamera(){
  if(S.animFrame){cancelAnimationFrame(S.animFrame);S.animFrame=null;}
  if(S.stream){S.stream.getTracks().forEach(t=>t.stop());S.stream=null;}
}

/* ═══════════════════════════════════
   STEP 5 – 필터
═══════════════════════════════════ */
function buildFilter() {
  S.currentFilter=0;
  const strip=document.getElementById('filter-strip');
  strip.innerHTML='';
  FILTERS.forEach((f,fi)=>{
    const item=document.createElement('div');
    item.className='filter-item'+(fi===0?' active':'');
    item.innerHTML=`<div class="filter-wrap${fi===0?' selected':''}"><canvas class="filter-thumb" width="88" height="70"></canvas></div><div class="filter-name">${f.name}</div>`;
    const thumb=item.querySelector('canvas');
    if(S.shots.length){
      const tc=thumb.getContext('2d');
      tc.drawImage(S.shots[0],0,0,88,70);
      if(f.fn) f.fn(tc,88,70);
    }
    item.onclick=()=>{
      S.currentFilter=fi;
      document.querySelectorAll('.filter-item').forEach((el,i)=>{
        el.classList.toggle('active',i===fi);
        el.querySelector('.filter-wrap').classList.toggle('selected',i===fi);
      });
      renderFinal(fi);
    };
    strip.appendChild(item);
  });
  renderFinal(0);
}

function renderFinal(fi) {
  const fc=document.getElementById('final-canvas');
  const shots=S.shots; const n=shots.length;
  if(!n) return;
  const sw=shots[0].width, sh=shots[0].height, gap=8;
  fc.width=sw; fc.height=sh*n+gap*(n-1);
  const fctx=fc.getContext('2d');
  fctx.fillStyle='#0a0a0a'; fctx.fillRect(0,0,fc.width,fc.height);
  shots.forEach((s,i)=>fctx.drawImage(s,0,i*(sh+gap),sw,sh));
  // logo watermark
  if(logoImg.complete&&logoImg.naturalWidth){
    const lh=Math.round(fc.height*.038);
    const lw=Math.round(lh*(logoImg.naturalWidth/logoImg.naturalHeight));
    fctx.save(); fctx.globalAlpha=.82;
    fctx.drawImage(logoImg, fc.width-lw-14, fc.height-lh-10, lw, lh);
    fctx.restore();
  }
  if(FILTERS[fi].fn) FILTERS[fi].fn(fctx,fc.width,fc.height);
}

/* filters */
function applyBW(c,w,h){const d=c.getImageData(0,0,w,h);for(let i=0;i<d.data.length;i+=4){const g=d.data[i]*.299+d.data[i+1]*.587+d.data[i+2]*.114;d.data[i]=d.data[i+1]=d.data[i+2]=g;}c.putImageData(d,0,0);}
function applySepia(c,w,h){const d=c.getImageData(0,0,w,h);for(let i=0;i<d.data.length;i+=4){const r=d.data[i],g=d.data[i+1],b=d.data[i+2];d.data[i]=Math.min(255,r*.393+g*.769+b*.189);d.data[i+1]=Math.min(255,r*.349+g*.686+b*.168);d.data[i+2]=Math.min(255,r*.272+g*.534+b*.131);}c.putImageData(d,0,0);}
function applyFilm(c,w,h){const d=c.getImageData(0,0,w,h);for(let i=0;i<d.data.length;i+=4){d.data[i]=Math.min(255,d.data[i]*1.1+10);d.data[i+1]=Math.min(255,d.data[i+1]*.95+5);d.data[i+2]=Math.min(255,d.data[i+2]*.85);const n=(Math.random()-.5)*18;d.data[i]+=n;d.data[i+1]+=n;d.data[i+2]+=n;}c.putImageData(d,0,0);const g=c.createRadialGradient(w/2,h/2,h*.3,w/2,h/2,h*.75);g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(0,0,0,.42)');c.fillStyle=g;c.fillRect(0,0,w,h);}
function applyVivid(c,w,h){const d=c.getImageData(0,0,w,h);for(let i=0;i<d.data.length;i+=4){d.data[i]=Math.min(255,d.data[i]*1.2);d.data[i+1]=Math.min(255,d.data[i+1]*1.15);d.data[i+2]=Math.min(255,d.data[i+2]*1.25);}c.putImageData(d,0,0);}
function applyRetro(c,w,h){const d=c.getImageData(0,0,w,h);for(let i=0;i<d.data.length;i+=4){d.data[i]=Math.min(255,d.data[i]*1.15+15);d.data[i+1]=Math.min(255,d.data[i+1]*.88+10);d.data[i+2]=Math.min(255,d.data[i+2]*.7+8);}c.putImageData(d,0,0);c.fillStyle='rgba(201,168,76,.07)';c.fillRect(0,0,w,h);}
function applyCool(c,w,h){const d=c.getImageData(0,0,w,h);for(let i=0;i<d.data.length;i+=4){d.data[i]=Math.max(0,d.data[i]-15);d.data[i+2]=Math.min(255,d.data[i+2]+25);}c.putImageData(d,0,0);}

/* ═══════════════════════════════════
   STEP 6 – QR 생성 (업로드→URL→QR)
═══════════════════════════════════ */
async function generateQR() {
  // 로딩 상태로 전환
  document.getElementById('qr-loading').style.display='flex';
  document.getElementById('qr-loading').style.flexDirection='column';
  document.getElementById('qr-loading').style.alignItems='center';
  document.getElementById('qr-loading').style.gap='14px';
  document.getElementById('qr-result-inner').style.display='none';
  document.getElementById('qr-error').style.display='none';
  document.getElementById('qr-timer').textContent='';
  document.getElementById('timer-fill').style.width='100%';
  document.getElementById('qr-hint').textContent='';
  document.getElementById('qr-container').innerHTML='';
  document.getElementById('qr-url').textContent='';
  goScreen('screen-qr');

  try {
    const fc=document.getElementById('final-canvas');
    const blob=await new Promise(res=>fc.toBlob(res,'image/jpeg',0.9));

    // file.io 업로드 (무료, CORS 지원, 1회 다운로드 후 자동삭제)
    const form=new FormData();
    form.append('file', blob, 'firstgym_photo.jpg');
    const res=await fetch('https://file.io/?expires=1d',{method:'POST',body:form});
    if(!res.ok) throw new Error('upload_fail');
    const json=await res.json();
    if(!json.success||!json.link) throw new Error('no_link');
    const url=json.link;

    // QR 생성
    document.getElementById('qr-loading').style.display='none';
    document.getElementById('qr-result-inner').style.display='flex';
    new QRCode(document.getElementById('qr-container'),{
      text:url, width:210, height:210,
      colorDark:'#0a0a0a', colorLight:'#ffffff',
      correctLevel:QRCode.CorrectLevel.M,
    });
    document.getElementById('qr-url').textContent=url;
    document.getElementById('qr-hint').textContent='📱 카메라로 QR 스캔 → 사진 다운로드
90초 후 앱 내 데이터 삭제 (서버 파일은 1일 후 자동 삭제)';
    startQRTimer(90);

  } catch(e) {
    document.getElementById('qr-loading').style.display='none';
    document.getElementById('qr-error').style.display='block';
    document.getElementById('qr-error').innerHTML=
      '업로드 실패 😢<br><span style="font-size:11px;color:#666">인터넷 연결을 확인하고<br>다시 시도해주세요</span>';
    document.getElementById('qr-hint').textContent='';
  }
}

function startQRTimer(sec) {
  clearInterval(S.qrTimer);
  let rem=sec;
  const tEl=document.getElementById('qr-timer');
  const fEl=document.getElementById('timer-fill');
  tEl.textContent=rem;
  fEl.style.transition='none'; fEl.style.width='100%';
  setTimeout(()=>fEl.style.transition='width 1s linear',50);
  S.qrTimer=setInterval(()=>{
    rem--;
    tEl.textContent=rem;
    fEl.style.width=(rem/sec*100)+'%';
    if(rem<=0){ clearInterval(S.qrTimer); S.shots=[]; resetAll(); }
  },1000);
}

function goFilterBack() {
  clearInterval(S.qrTimer);
  goScreen('screen-filter');
}

function resetAll() {
  clearInterval(S.qrTimer); stopCamera();
  S.shots=[]; S.currentShot=0; S.currentFilter=0; S.shooting=false;
  document.getElementById('qr-container').innerHTML='';
  goScreen('screen-shot');
}
</script>
