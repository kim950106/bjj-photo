<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>퍼스트짐 포토부스</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700;900&display=swap');

:root{
  --black:#030303;
  --panel:#101010;
  --panel2:#181818;
  --line:#2a2a2a;
  --white:#f5f1e8;
  --muted:#747474;
  --gold:#c9a84c;
  --gold2:#f0d77c;
  --red:#e63946;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--black);color:var(--white);font-family:'Noto Sans KR',sans-serif;user-select:none;}
button{font:inherit;color:inherit;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px;}
.screen.active{display:flex;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,7vw,62px);letter-spacing:7px;color:var(--gold);line-height:1;text-shadow:0 0 26px rgba(201,168,76,.35);}
.sub{margin-top:12px;margin-bottom:36px;color:#555;font-size:12px;letter-spacing:4px;text-transform:uppercase;}
.title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:5px;color:var(--gold);margin-bottom:24px;text-align:center;}
.caption{font-size:13px;color:var(--muted);line-height:1.7;text-align:center;margin-top:-10px;margin-bottom:24px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:min(100%,520px);}
.choice{height:132px;border:1px solid var(--line);border-radius:8px;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:transform .14s,border-color .14s,background .14s;}
.choice:active{transform:scale(.97);border-color:var(--gold);}
.choice strong{font-family:'Bebas Neue',sans-serif;font-size:56px;color:var(--gold);line-height:1;}
.choice span{font-size:12px;color:#777;letter-spacing:2px;}
.round-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;width:min(100%,560px);}
.round{width:84px;height:84px;border-radius:50%;border:1px solid var(--line);background:#111;color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.round.skip{width:auto;padding:0 24px;border-radius:40px;font-family:'Noto Sans KR',sans-serif;font-size:14px;color:#777;}
.round:active{transform:scale(.94);border-color:var(--gold);color:var(--gold);}
.belt-list{display:flex;flex-direction:column;gap:14px;width:min(100%,620px);max-height:58vh;overflow:auto;padding-right:4px;}
.belt-card{background:#101010;border:1px solid var(--line);border-radius:8px;padding:16px;}
.belt-label{font-size:12px;letter-spacing:2px;color:#777;margin-bottom:13px;}
.belt-options{display:flex;gap:12px;flex-wrap:wrap;}
.belt-opt{width:72px;height:72px;border-radius:10px;border:2px solid transparent;background:#171717;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;}
.belt-opt img{max-width:90%;max-height:90%;object-fit:contain;display:block;}
.belt-opt.none{font-size:28px;color:#555;border-color:#2c2c2c;}
.belt-opt.selected{border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.45);}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:24px;}
.btn{border:1px solid var(--line);background:transparent;color:#777;border-radius:8px;padding:13px 22px;cursor:pointer;min-width:112px;}
.btn.primary{border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#070707;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;min-width:190px;padding:15px 28px;}
.btn:active{transform:scale(.97);}

#screen-camera{padding:0;justify-content:flex-start;background:#000;}
.camera-stage{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden;}
#preview{display:block;width:100%;height:100%;object-fit:contain;background:#000;}
#video{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;}
.camera-top{position:absolute;left:0;right:0;top:0;padding:18px 22px 70px;background:linear-gradient(rgba(0,0,0,.76),rgba(0,0,0,0));display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.status{font-size:12px;line-height:1.6;color:#b0b0b0;max-width:54vw;}
.counter{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:4px;color:var(--gold);line-height:1;}
.camera-bottom{position:absolute;left:0;right:0;bottom:0;padding:18px 24px 30px;background:linear-gradient(rgba(0,0,0,0),rgba(0,0,0,.92) 30%,rgba(0,0,0,.98));display:flex;flex-direction:column;align-items:center;gap:16px;}
.frame-picker{width:min(100%,700px);display:flex;gap:12px;justify-content:center;overflow-x:auto;padding:4px 0 2px;scrollbar-width:none;}
.frame-picker::-webkit-scrollbar{display:none;}
.frame-opt{flex:0 0 124px;height:82px;border:2px solid transparent;border-radius:8px;background:#0b0b0b;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.frame-opt.selected{border-color:var(--gold);}
.mini-frame{width:58px;height:72px;background:#050505;border:6px solid #050505;box-shadow:0 0 0 1px #333 inset;display:grid;gap:3px;padding:4px;}
.mini-frame.gold{box-shadow:0 0 0 1px var(--gold) inset;}
.mini-frame.white{background:#e9e5dd;border-color:#e9e5dd;}
.mini-cell{background:#777;border-radius:1px;}
.frame-name{position:absolute;bottom:5px;left:0;right:0;text-align:center;font-size:10px;color:#777;letter-spacing:1px;}
.shoot-row{display:flex;align-items:center;justify-content:center;gap:20px;width:100%;}
.shutter{width:82px;height:82px;border-radius:50%;border:5px solid rgba(255,255,255,.32);background:#f5f1e8;box-shadow:0 0 0 7px rgba(255,255,255,.08);cursor:pointer;}
.shutter:active{transform:scale(.92);background:var(--gold);}
.shutter.disabled{opacity:.35;pointer-events:none;}
#countdown{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',sans-serif;font-size:150px;color:var(--gold);text-shadow:0 0 42px rgba(201,168,76,.9);opacity:0;transition:opacity .15s;pointer-events:none;}
#flash{position:absolute;inset:0;background:#fff;opacity:0;transition:opacity .08s;pointer-events:none;}

#screen-result,#screen-qr{overflow:auto;justify-content:flex-start;padding:20px 16px 26px;}
.result-wrap{width:min(100%,420px);border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#050505;margin-top:8px;}
#resultCanvas{display:block;width:100%;height:auto;}
.filter-strip{display:flex;gap:10px;width:100%;max-width:620px;overflow-x:auto;padding:8px 2px 4px;scrollbar-width:none;}
.filter-strip::-webkit-scrollbar{display:none;}
.filter-btn{border:1px solid var(--line);background:#111;color:#777;border-radius:8px;padding:11px 16px;white-space:nowrap;cursor:pointer;}
.filter-btn.selected{border-color:var(--gold);color:var(--gold);}
.qr-box{width:min(100%,380px);background:#111;border:1px solid var(--line);border-radius:8px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:18px;}
.spinner{width:52px;height:52px;border:3px solid #333;border-top-color:var(--gold);border-radius:50%;animation:spin .85s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#qr-container{background:#fff;border-radius:8px;padding:12px;}
.qr-text{font-size:12px;color:#777;line-height:1.7;text-align:center;white-space:pre-line;word-break:break-all;}

@media (max-width:560px){
  .screen{padding:22px;}
  .grid-2{gap:12px;}
  .choice{height:116px;}
  .choice strong{font-size:48px;}
  .round{width:72px;height:72px;}
  .camera-bottom{padding-left:14px;padding-right:14px;}
}
</style>
</head>
<body>

<section class="screen active" id="screen-shot">
  <div class="brand">FIRST GYM</div>
  <div class="sub">BJJ PHOTO BOOTH</div>
  <div class="grid-2">
    <button class="choice" data-shots="1"><strong>1</strong><span>ONE SHOT</span></button>
    <button class="choice" data-shots="2"><strong>2</strong><span>TWO SHOTS</span></button>
    <button class="choice" data-shots="3"><strong>3</strong><span>THREE SHOTS</span></button>
    <button class="choice" data-shots="4"><strong>4</strong><span>FOUR SHOTS</span></button>
  </div>
</section>

<section class="screen" id="screen-people">
  <div class="title">촬영 인원</div>
  <div class="caption">선택한 순서대로 카메라 화면 왼쪽부터 띠가 매칭됩니다.</div>
  <div class="round-row">
    <button class="round" data-people="1">1</button>
    <button class="round" data-people="2">2</button>
    <button class="round" data-people="3">3</button>
    <button class="round" data-people="4">4</button>
    <button class="round skip" data-people="0">띠 없음</button>
  </div>
  <div class="btn-row">
    <button class="btn" data-back="screen-shot">이전</button>
  </div>
</section>

<section class="screen" id="screen-belt">
  <div class="title">띠 선택</div>
  <div class="belt-list" id="beltList"></div>
  <div class="btn-row">
    <button class="btn" data-back="screen-people">이전</button>
    <button class="btn primary" id="openCamera">카메라 열기</button>
  </div>
</section>

<section class="screen" id="screen-camera">
  <video id="video" autoplay playsinline muted></video>
  <div class="camera-stage">
    <canvas id="preview"></canvas>
    <div class="camera-top">
      <div class="status" id="cameraStatus">카메라 접근을 허용하면 프레임을 고르고 촬영할 수 있습니다.</div>
      <div class="counter" id="shotCounter">0/1</div>
    </div>
    <div id="countdown"></div>
    <div id="flash"></div>
    <div class="camera-bottom">
      <div class="frame-picker" id="framePicker"></div>
      <div class="shoot-row">
        <button class="btn" id="cameraBack">이전</button>
        <button class="shutter" id="shutter" aria-label="촬영"></button>
        <button class="btn" id="finishEarly">완료</button>
      </div>
    </div>
  </div>
</section>

<section class="screen" id="screen-result">
  <div class="title">프레임 선택</div>
  <div class="filter-strip" id="resultFrames"></div>
  <div class="result-wrap"><canvas id="resultCanvas"></canvas></div>
  <div class="btn-row">
    <button class="btn" id="retake">재촬영</button>
    <button class="btn" id="shareBtn">공유/저장</button>
    <button class="btn primary" id="qrBtn">QR 생성</button>
  </div>
</section>

<section class="screen" id="screen-qr">
  <div class="title">QR 저장</div>
  <div class="qr-box">
    <div id="qrLoading" style="display:flex;flex-direction:column;align-items:center;gap:14px;">
      <div class="spinner"></div>
      <div class="qr-text">사진 업로드 중...</div>
    </div>
    <div id="qrReady" style="display:none;flex-direction:column;align-items:center;gap:14px;">
      <div id="qr-container"></div>
      <div class="qr-text" id="qrText"></div>
    </div>
    <div class="qr-text" id="qrError" style="display:none;color:var(--red);"></div>
  </div>
  <div class="btn-row">
    <button class="btn" data-back="screen-result">프레임으로</button>
    <button class="btn primary" id="homeBtn">처음으로</button>
  </div>
</section>

<script type="module">
const IMGBB_API_KEY = 'cfd14e87366f046f478343aeee56cfc3';
const OUT_W = 1080;
const OUT_H = 1350;
const PHOTO_RATIO = 4 / 5;
const CAMERA_ZOOM = 1.28;

const BELTS = [
  { name:'없음', src:null },
  { name:'화이트', src:'1.png' },
  { name:'블루', src:'2.png' },
  { name:'퍼플', src:'3.png' },
  { name:'브라운', src:'4.png' },
  { name:'블랙', src:'5.png' },
];

const FRAMES = [
  { id:'black', name:'BLACK', color:'#030303', line:'#202020', logo:true },
  { id:'gold', name:'GOLD', color:'#050505', line:'#c9a84c', logo:true },
  { id:'white', name:'WHITE', color:'#e9e5dd', line:'#d2c8b8', logo:true },
];

const FILTERS = [
  { id:'none', name:'원본', fn:null },
  { id:'film', name:'필름', fn:applyFilm },
  { id:'bw', name:'흑백', fn:applyBW },
  { id:'vivid', name:'비비드', fn:applyVivid },
];

const S = {
  totalShots:1,
  people:1,
  belts:[0],
  frame:'black',
  filter:'none',
  shots:[],
  stream:null,
  faces:[],
  shooting:false,
  detector:null,
  detectorReady:false,
  detectBusy:false,
  raf:null,
  lastVideoTime:-1,
};

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => [...document.querySelectorAll(sel)];
const video = $('#video');
const preview = $('#preview');
const pctx = preview.getContext('2d');
const resultCanvas = $('#resultCanvas');
const rctx = resultCanvas.getContext('2d');

const beltImgs = BELTS.map((b) => b.src ? loadImg(b.src) : null);
const logoImg = loadImg('Log.png');

function loadImg(src){
  const img = new Image();
  img.src = src;
  img.decoding = 'async';
  img.onerror = () => img.dataset.missing = '1';
  return img;
}

function go(id){
  $$('.screen').forEach((s) => s.classList.remove('active'));
  $('#' + id).classList.add('active');
}

function stopCamera(){
  if(S.raf) cancelAnimationFrame(S.raf);
  S.raf = null;
  if(S.stream){
    S.stream.getTracks().forEach((t) => t.stop());
    S.stream = null;
  }
}

function resetAll(){
  stopCamera();
  S.totalShots = 1;
  S.people = 1;
  S.belts = [0];
  S.frame = 'black';
  S.filter = 'none';
  S.shots = [];
  S.faces = [];
  S.shooting = false;
  $('#qr-container').innerHTML = '';
  go('screen-shot');
}

$$('[data-shots]').forEach((btn) => {
  btn.addEventListener('click', () => {
    S.totalShots = Number(btn.dataset.shots);
    S.shots = [];
    go('screen-people');
  });
});

$$('[data-people]').forEach((btn) => {
  btn.addEventListener('click', () => {
    S.people = Number(btn.dataset.people);
    S.belts = new Array(Math.max(S.people, 1)).fill(0);
    if(S.people === 0){
      openCameraFlow();
    }else{
      buildBeltUI();
      go('screen-belt');
    }
  });
});

$$('[data-back]').forEach((btn) => btn.addEventListener('click', () => go(btn.dataset.back)));
$('#openCamera').addEventListener('click', openCameraFlow);
$('#cameraBack').addEventListener('click', () => { stopCamera(); go(S.people ? 'screen-belt' : 'screen-people'); });
$('#retake').addEventListener('click', () => { S.shots = []; openCameraFlow(); });
$('#homeBtn').addEventListener('click', resetAll);
$('#finishEarly').addEventListener('click', () => {
  if(S.shots.length){
    stopCamera();
    buildResult();
    go('screen-result');
  }
});
$('#shutter').addEventListener('click', takeShot);
$('#shareBtn').addEventListener('click', shareImage);
$('#qrBtn').addEventListener('click', generateQR);

function buildBeltUI(){
  const list = $('#beltList');
  list.innerHTML = '';
  for(let p = 0; p < S.people; p++){
    const card = document.createElement('div');
    card.className = 'belt-card';
    card.innerHTML = `<div class="belt-label">인원 ${p + 1} · 화면 왼쪽부터 ${p + 1}번째</div><div class="belt-options"></div>`;
    const row = card.querySelector('.belt-options');
    BELTS.forEach((belt, i) => {
      const opt = document.createElement('button');
      opt.className = 'belt-opt' + (i === 0 ? ' none' : '') + (S.belts[p] === i ? ' selected' : '');
      opt.title = belt.name;
      if(i === 0){
        opt.textContent = '×';
      }else{
        const img = document.createElement('img');
        img.src = belt.src;
        img.alt = belt.name;
        opt.appendChild(img);
      }
      opt.addEventListener('click', () => {
        S.belts[p] = i;
        row.querySelectorAll('.belt-opt').forEach((el) => el.classList.remove('selected'));
        opt.classList.add('selected');
      });
      row.appendChild(opt);
    });
    list.appendChild(card);
  }
}

function buildFramePicker(target, compact = false){
  target.innerHTML = '';
  FRAMES.forEach((frame) => {
    const btn = document.createElement('button');
    btn.className = (compact ? 'filter-btn' : 'frame-opt') + (S.frame === frame.id ? ' selected' : '');
    btn.dataset.frame = frame.id;
    if(compact){
      btn.textContent = frame.name;
    }else{
      btn.innerHTML = `<div class="mini-frame ${frame.id}"><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div></div><div class="frame-name">${frame.name}</div>`;
    }
    btn.addEventListener('click', () => {
      S.frame = frame.id;
      buildFramePicker($('#framePicker'));
      buildFramePicker($('#resultFrames'), true);
      if(S.shots.length) buildResult();
    });
    target.appendChild(btn);
  });
}

function buildResultFrames(){
  const bar = $('#resultFrames');
  bar.innerHTML = '';
  FRAMES.forEach((f) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (S.frame === f.id ? ' selected' : '');
    btn.textContent = f.name;
    btn.addEventListener('click', () => {
      S.frame = f.id;
      buildResultFrames();
      buildResult();
    });
    bar.appendChild(btn);
  });
  FILTERS.forEach((f) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (S.filter === f.id ? ' selected' : '');
    btn.textContent = f.name;
    btn.addEventListener('click', () => {
      S.filter = f.id;
      buildResultFrames();
      buildResult();
    });
    bar.appendChild(btn);
  });
}

async function openCameraFlow(){
  S.shots = [];
  S.faces = [];
  S.shooting = false;
  updateCounter();
  buildFramePicker($('#framePicker'));
  go('screen-camera');
  $('#cameraStatus').textContent = '카메라 접근을 허용해주세요.';
  try{
    stopCamera();
    S.stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:'user',
        width:{ideal:1280},
        height:{ideal:1600},
      },
      audio:false,
    });
    video.srcObject = S.stream;
    await video.play();
    $('#cameraStatus').textContent = '프레임을 고르고 촬영하세요. 얼굴을 찾으면 띠가 머리 위를 따라갑니다.';
    initFaceDetector();
    renderCamera();
  }catch(err){
    console.error(err);
    $('#cameraStatus').textContent = '카메라 권한이 필요합니다. Safari 설정에서 카메라 접근을 허용해주세요.';
  }
}

async function initFaceDetector(){
  if(S.detector || S.detectorReady) return;
  try{
    const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14');
    const fileset = await vision.FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
    S.detector = await vision.FaceDetector.createFromOptions(fileset, {
      baseOptions:{
        modelAssetPath:'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/latest/blaze_face_short_range.tflite',
        delegate:'GPU',
      },
      runningMode:'VIDEO',
      minDetectionConfidence:0.5,
      minSuppressionThreshold:0.3,
    });
    S.detectorReady = true;
    $('#cameraStatus').textContent = '얼굴 추적 준비 완료. 프레임을 고르고 촬영하세요.';
  }catch(err){
    console.warn(err);
    $('#cameraStatus').textContent = '얼굴 추적을 불러오지 못해 인원별 위치 기준으로 띠를 표시합니다.';
  }
}

function renderCamera(){
  if(!S.stream) return;
  resizePreview();
  drawVideoToCanvas(pctx, preview.width, preview.height, true);
  runFaceDetection();
  drawFrameGuide(pctx, preview.width, preview.height);
  drawBelts(pctx, preview.width, preview.height, S.faces, true);
  S.raf = requestAnimationFrame(renderCamera);
}

function resizePreview(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.round(preview.clientWidth * dpr);
  const h = Math.round(preview.clientHeight * dpr);
  if(preview.width !== w || preview.height !== h){
    preview.width = w;
    preview.height = h;
  }
}

function getSourceRect(destW, destH){
  const vw = video.videoWidth || 1280;
  const vh = video.videoHeight || 960;
  const targetA = destW / destH;
  let sw = vw / CAMERA_ZOOM;
  let sh = vh / CAMERA_ZOOM;
  if(sw / sh > targetA) sw = sh * targetA;
  else sh = sw / targetA;
  return { sx:(vw - sw) / 2, sy:(vh - sh) / 2, sw, sh, vw, vh };
}

function drawVideoToCanvas(ctx, w, h, mirror){
  const r = getSourceRect(w, h);
  ctx.save();
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);
  if(mirror){
    ctx.translate(w, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(video, r.sx, r.sy, r.sw, r.sh, 0, 0, w, h);
  ctx.restore();
}

function runFaceDetection(){
  if(!S.detectorReady || !S.detector || S.detectBusy || video.readyState < 2) return;
  if(video.currentTime === S.lastVideoTime) return;
  S.lastVideoTime = video.currentTime;
  S.detectBusy = true;
  try{
    const res = S.detector.detectForVideo(video, performance.now());
    S.faces = (res.detections || [])
      .map((d) => d.boundingBox)
      .filter(Boolean)
      .sort((a, b) => mapFace(a, preview.width, preview.height).cx - mapFace(b, preview.width, preview.height).cx)
      .slice(0, Math.max(S.people, 1));
  }catch(err){
    console.warn(err);
  }finally{
    S.detectBusy = false;
  }
}

function mapFace(face, w, h){
  const r = getSourceRect(w, h);
  const cxRaw = face.originX + face.width / 2;
  const cyRaw = face.originY + face.height / 2;
  const x = (cxRaw - r.sx) / r.sw * w;
  const y = (cyRaw - r.sy) / r.sh * h;
  return {
    cx:w - x,
    cy:y,
    top:(face.originY - r.sy) / r.sh * h,
    width:face.width / r.sw * w,
    height:face.height / r.sh * h,
  };
}

function fallbackFace(i, count, w, h){
  const gap = w / Math.max(count, 1);
  const cx = gap * i + gap / 2;
  const faceW = Math.min(w * 0.22, gap * 0.44);
  return { cx, cy:h * 0.34, top:h * 0.2, width:faceW, height:faceW * 1.18 };
}

function drawBelts(ctx, w, h, faces, mirroredPreview){
  if(S.people === 0) return;
  const mapped = faces.length ? faces.map((f) => mapFace(f, w, h)) : [];
  const count = Math.max(S.people, mapped.length, 1);
  for(let i = 0; i < S.people; i++){
    const beltIndex = S.belts[i] || 0;
    if(!beltIndex) continue;
    const img = beltImgs[beltIndex];
    const face = mapped[i] || fallbackFace(i, count, w, h);
    drawOneBelt(ctx, img, face, w, h);
  }
}

function drawOneBelt(ctx, img, face, w, h){
  const bw = Math.max(120, face.width * 1.55);
  const naturalRatio = img && img.complete && img.naturalWidth ? img.naturalHeight / img.naturalWidth : 1;
  const bh = bw * naturalRatio;
  const x = face.cx - bw / 2;
  const y = Math.max(h * 0.035, face.top - bh * 0.82);
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.55)';
  ctx.shadowBlur = 18;
  if(img && img.complete && img.naturalWidth && img.dataset.missing !== '1'){
    ctx.drawImage(img, x, y, bw, bh);
  }else{
    ctx.strokeStyle = 'rgba(201,168,76,.8)';
    ctx.lineWidth = Math.max(5, bw * 0.06);
    ctx.beginPath();
    ctx.ellipse(face.cx, y + bh * 0.45, bw * 0.38, bh * 0.18, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawFrameGuide(ctx, w, h){
  const frame = FRAMES.find((f) => f.id === S.frame) || FRAMES[0];
  ctx.save();
  ctx.strokeStyle = frame.line;
  ctx.lineWidth = Math.max(3, w * 0.006);
  ctx.strokeRect(w * 0.055, h * 0.045, w * 0.89, h * 0.91);
  ctx.fillStyle = 'rgba(0,0,0,.28)';
  ctx.fillRect(w * 0.055, h * 0.045, w * 0.89, h * 0.05);
  ctx.fillRect(w * 0.055, h * 0.905, w * 0.89, h * 0.05);
  ctx.restore();
}

async function takeShot(){
  if(S.shooting || !S.stream || S.shots.length >= S.totalShots) return;
  S.shooting = true;
  $('#shutter').classList.add('disabled');
  await countdown(3);
  const shot = document.createElement('canvas');
  shot.width = 1080;
  shot.height = 1350;
  const ctx = shot.getContext('2d');
  drawVideoToCanvas(ctx, shot.width, shot.height, true);
  drawBelts(ctx, shot.width, shot.height, S.faces, true);
  S.shots.push(shot);
  flash();
  updateCounter();
  if(S.shots.length >= S.totalShots){
    setTimeout(() => {
      stopCamera();
      buildResult();
      go('screen-result');
    }, 420);
  }else{
    setTimeout(() => {
      S.shooting = false;
      $('#shutter').classList.remove('disabled');
    }, 420);
  }
}

function countdown(sec){
  return new Promise((resolve) => {
    const el = $('#countdown');
    let n = sec;
    el.textContent = n;
    el.style.opacity = '1';
    const tick = setInterval(() => {
      n--;
      if(n <= 0){
        clearInterval(tick);
        el.style.opacity = '0';
        resolve();
      }else{
        el.textContent = n;
      }
    }, 850);
  });
}

function flash(){
  const f = $('#flash');
  f.style.opacity = '1';
  setTimeout(() => f.style.opacity = '0', 120);
}

function updateCounter(){
  $('#shotCounter').textContent = `${S.shots.length}/${S.totalShots}`;
}

function buildResult(){
  buildResultFrames();
  resultCanvas.width = OUT_W;
  resultCanvas.height = OUT_H;
  const frame = FRAMES.find((f) => f.id === S.frame) || FRAMES[0];
  rctx.fillStyle = frame.color;
  rctx.fillRect(0, 0, OUT_W, OUT_H);
  drawPhotoCells(rctx);
  drawFrameDecoration(rctx, frame);
  const filter = FILTERS.find((f) => f.id === S.filter);
  if(filter && filter.fn) filter.fn(rctx, OUT_W, OUT_H);
}

function drawPhotoCells(ctx){
  const n = S.shots.length || 1;
  const layouts = {
    1: [{x:90,y:55,w:900,h:1125}],
    2: [{x:70,y:235,w:455,h:569},{x:555,y:235,w:455,h:569}],
    3: [{x:80,y:70,w:440,h:550},{x:560,y:70,w:440,h:550},{x:320,y:640,w:440,h:550}],
    4: [{x:92,y:60,w:432,h:540},{x:556,y:60,w:432,h:540},{x:92,y:630,w:432,h:540},{x:556,y:630,w:432,h:540}],
  };
  const cells = layouts[Math.min(n, 4)];
  cells.forEach((cell, i) => {
    ctx.save();
    ctx.fillStyle = '#000';
    ctx.fillRect(cell.x - 8, cell.y - 8, cell.w + 16, cell.h + 16);
    ctx.drawImage(S.shots[i] || S.shots[0], cell.x, cell.y, cell.w, cell.h);
    ctx.restore();
  });
}

function drawFrameDecoration(ctx, frame){
  ctx.save();
  ctx.strokeStyle = frame.line;
  ctx.lineWidth = frame.id === 'gold' ? 7 : 2;
  ctx.strokeRect(40, 40, OUT_W - 80, OUT_H - 80);
  const logoReady = logoImg.complete && logoImg.naturalWidth && logoImg.dataset.missing !== '1';
  const logoMaxW = 285;
  const logoMaxH = 86;
  const x = OUT_W - 54 - logoMaxW;
  const y = OUT_H - 48 - logoMaxH;
  ctx.fillStyle = frame.color;
  ctx.fillRect(x - 30, y - 22, logoMaxW + 42, logoMaxH + 30);
  if(logoReady){
    const ratio = Math.min(logoMaxW / logoImg.naturalWidth, logoMaxH / logoImg.naturalHeight);
    const lw = logoImg.naturalWidth * ratio;
    const lh = logoImg.naturalHeight * ratio;
    ctx.drawImage(logoImg, OUT_W - 58 - lw, OUT_H - 58 - lh, lw, lh);
  }else{
    ctx.font = '48px Bebas Neue';
    ctx.fillStyle = frame.id === 'white' ? '#111' : '#c9a84c';
    ctx.textAlign = 'right';
    ctx.fillText('FIRST GYM', OUT_W - 58, OUT_H - 70);
  }
  ctx.restore();
}

function applyBW(ctx,w,h){
  const img = ctx.getImageData(0,0,w,h);
  const d = img.data;
  for(let i=0;i<d.length;i+=4){
    const g = d[i] * .299 + d[i+1] * .587 + d[i+2] * .114;
    d[i]=d[i+1]=d[i+2]=g;
  }
  ctx.putImageData(img,0,0);
}

function applyVivid(ctx,w,h){
  const img = ctx.getImageData(0,0,w,h);
  const d = img.data;
  for(let i=0;i<d.length;i+=4){
    d[i] = Math.min(255, d[i] * 1.13 + 4);
    d[i+1] = Math.min(255, d[i+1] * 1.08 + 3);
    d[i+2] = Math.min(255, d[i+2] * 1.12 + 4);
  }
  ctx.putImageData(img,0,0);
}

function applyFilm(ctx,w,h){
  const img = ctx.getImageData(0,0,w,h);
  const d = img.data;
  for(let i=0;i<d.length;i+=4){
    const n = (Math.random() - .5) * 12;
    d[i] = Math.min(255, d[i] * 1.05 + 8 + n);
    d[i+1] = Math.min(255, d[i+1] * .98 + 4 + n);
    d[i+2] = Math.min(255, d[i+2] * .92 + n);
  }
  ctx.putImageData(img,0,0);
  const g = ctx.createRadialGradient(w/2,h/2,h*.25,w/2,h/2,h*.74);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,.28)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,w,h);
}

async function shareImage(){
  try{
    const blob = await new Promise((res) => resultCanvas.toBlob(res, 'image/png'));
    const file = new File([blob], 'firstgym_photo.png', { type:'image/png' });
    if(navigator.share && navigator.canShare && navigator.canShare({ files:[file] })){
      await navigator.share({ files:[file], title:'퍼스트짐 포토부스' });
      return;
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'firstgym_photo.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }catch(err){
    console.error(err);
    alert('공유 또는 저장을 지원하지 않는 환경입니다.');
  }
}

async function uploadToImgBB(){
  const blob = await new Promise((res) => resultCanvas.toBlob(res, 'image/jpeg', .92));
  const base64 = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(String(reader.result).split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
  const form = new FormData();
  form.append('key', IMGBB_API_KEY);
  form.append('image', base64);
  form.append('name', 'firstgym_' + Date.now());
  const res = await fetch('https://api.imgbb.com/1/upload', { method:'POST', body:form });
  if(!res.ok) throw new Error('upload_fail');
  const json = await res.json();
  if(!json.success || !json.data) throw new Error('no_link');
  return json.data.url || json.data.display_url;
}

async function generateQR(){
  go('screen-qr');
  $('#qrLoading').style.display = 'flex';
  $('#qrReady').style.display = 'none';
  $('#qrError').style.display = 'none';
  $('#qr-container').innerHTML = '';
  try{
    const url = await uploadToImgBB();
    $('#qrLoading').style.display = 'none';
    $('#qrReady').style.display = 'flex';
    new QRCode($('#qr-container'), {
      text:url,
      width:220,
      height:220,
      colorDark:'#050505',
      colorLight:'#ffffff',
      correctLevel:QRCode.CorrectLevel.M,
    });
    $('#qrText').textContent = `QR 스캔 후 사진을 저장하세요.\n${url}`;
  }catch(err){
    console.error(err);
    $('#qrLoading').style.display = 'none';
    $('#qrError').style.display = 'block';
    $('#qrError').textContent = '업로드 실패. 인터넷 연결 또는 API 키를 확인해주세요.';
  }
}
